<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ATM Security System — Real-time facial occlusion detection using YOLOv8 for secure transactions.">
    <title>ATM Security — Face Verification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header" id="header">
            <div class="header-left">
                <div class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </div>
                <div>
                    <h1>ATM Security</h1>
                    <p class="header-subtitle">Facial Occlusion Detection System</p>
                </div>
            </div>
            <div class="connection-badge" id="connectionBadge">
                <span class="conn-dot"></span>
                <span class="conn-text">Disconnected</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Video Feed Panel -->
            <section class="panel video-panel" id="videoPanel">
                <div class="panel-header">
                    <span class="panel-icon">📹</span>
                    <span>Live Camera Feed</span>
                    <span class="fps-badge" id="fpsBadge">0 FPS</span>
                </div>
                <div class="canvas-wrapper" id="canvasWrapper">
                    <video id="video" autoplay playsinline muted></video>
                    <canvas id="canvas"></canvas>
                    <canvas id="overlay"></canvas>
                    <!-- Scanning overlay -->
                    <div class="scan-line" id="scanLine"></div>
                    <!-- Corner markers -->
                    <div class="corner-mark tl"></div>
                    <div class="corner-mark tr"></div>
                    <div class="corner-mark bl"></div>
                    <div class="corner-mark br"></div>
                </div>
            </section>

            <!-- Info Panel -->
            <aside class="panel info-panel">
                <!-- Status Card -->
                <div class="status-card" id="statusCard" data-status="idle">
                    <div class="status-icon" id="statusIcon">
                        <svg id="iconIdle" class="icon active" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                        <svg id="iconScanning" class="icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg id="iconGranted" class="icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
                        </svg>
                        <svg id="iconDenied" class="icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
                        </svg>
                    </div>
                    <div class="status-text" id="statusText">INITIALIZING</div>
                    <div class="status-sub" id="statusSub">Starting camera...</div>
                </div>

                <!-- Detections List -->
                <div class="detections-card">
                    <div class="panel-header">
                        <span class="panel-icon">🔍</span>
                        <span>Detections</span>
                    </div>
                    <div class="detections-list" id="detectionsList">
                        <div class="empty-state">No detections yet</div>
                    </div>
                </div>

                <!-- System Log -->
                <div class="log-card">
                    <div class="panel-header">
                        <span class="panel-icon">📋</span>
                        <span>Event Log</span>
                        <button class="btn-clear" id="btnClearLog" title="Clear log">✕</button>
                    </div>
                    <div class="log-list" id="logList"></div>
                </div>
            </aside>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
